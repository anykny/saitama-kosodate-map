    let meta=d['住所'];
    if(d['対象学年'])meta+='<br>対象: '+d['対象学年'].replace(/\//g,'・');
    if(d['費用目安'])meta+='<br>費用: '+d['費用目安'];
    return '<div class="card"><h3>'+d['名称']+'</h3>'+
      '<div class="tags"><span class="tag '+cat+'">'+cat+'</span></div>'+
      '<div class="meta">'+meta+'</div>'+
      '<div class="links"><a href="'+mapUrl+'" target="_blank">Google Maps</a></div></div>';
  }).join('');
}
searchEl.addEventListener('input',render);catEl.addEventListener('change',render);
wardEl.addEventListener('change',render);
render();
</script>
</body>
</html>

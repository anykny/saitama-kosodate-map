const listEl=document.getElementById('list'),countEl=document.getElementById('count');
const searchEl=document.getElementById('search'),typeEl=document.getElementById('filterType');
const setupEl=document.getElementById('filterSetup'),wardEl=document.getElementById('filterWard');
const supportEl=document.getElementById('filterSupport');
function render(){
  const q=searchEl.value.toLowerCase(),t=typeEl.value,s=setupEl.value,w=wardEl.value,sp=supportEl.value;
  const f=DATA.filter(d=>{
    if(q&&!(d['名称'].toLowerCase().includes(q)||d['住所'].toLowerCase().includes(q)))return false;
    if(t&&d['種別']!==t)return false;
    if(s&&d['設置区分']!==s)return false;
    if(w&&d['区']!==w)return false;
    if(sp&&!d['特別支援'].includes(sp))return false;
    return true;
  });
  countEl.textContent=f.length+' 件表示 / 全 '+DATA.length+' 件';
  listEl.innerHTML=f.map(d=>{
    const mapUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(d['住所']);
    let tags='<span class="tag '+d['設置区分']+'">'+d['設置区分']+'</span>';
    if(d['特別支援'])tags+=' <span class="tag support">'+d['特別支援']+'</span>';
    let meta=d['住所'];
    if(d['定員'])meta+=' | 定員: '+d['定員']+'名';
    if(d['電話番号'])meta+=' | TEL: '+d['電話番号'];
    if(d['保育時間'])meta+=' | '+d['保育時間'];
    if(d['対象'])meta+=' | '+d['対象'];
    return '<div class="card '+d['種別']+'"><h3>'+d['名称']+' <small style="color:#999;font-weight:normal">('+d['種別']+')</small></h3>'+
      '<div class="tags">'+tags+'</div>'+
      '<div class="meta">'+meta+'</div>'+
      '<div class="links"><a href="'+mapUrl+'" target="_blank">Google Maps</a></div></div>';
  }).join('');
}
searchEl.addEventListener('input',render);typeEl.addEventListener('change',render);
setupEl.addEventListener('change',render);wardEl.addEventListener('change',render);
supportEl.addEventListener('change',render);
render();
</script>

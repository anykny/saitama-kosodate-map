  countEl.textContent = filtered.length + ' 件表示 / 全 ' + DATA.length + ' 件';
  
  listEl.innerHTML = filtered.map(d => {
    const cats = d['診療科'].split('・');
    const mainCat = cats[0];
    const tags = cats.map(c => '<span class="tag ' + c + '">' + c + '</span>').join('');
    const addr = d['住所'];
    const mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr);
    
    let links = '<a class="map-link" href="' + mapUrl + '" target="_blank">Google Maps</a>';
    if (d['URL']) {
      links += '<a class="web-link" href="' + d['URL'] + '" target="_blank">公式サイト</a>';
    }
    
    let rest = d['休診日'] ? '<br>休診: ' + d['休診日'] : '';
    
    return '<div class="card ' + mainCat + '">' +
      '<h3>' + d['名称'] + '</h3>' +
      '<div class="tags">' + tags + '</div>' +
      '<div class="meta">' + addr + rest + '</div>' +
      '<div class="links">' + links + '</div>' +
      '</div>';
  }).join('');
}

searchEl.addEventListener('input', render);
catEl.addEventListener('change', render);
wardEl.addEventListener('change', render);
render();
</script>
</body>
</html>

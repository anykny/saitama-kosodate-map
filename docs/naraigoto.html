const listEl=document.getElementById('list'),countEl=document.getElementById('count');
const searchEl=document.getElementById('search'),genreEl=document.getElementById('filterGenre');
const wardEl=document.getElementById('filterWard'),ageEl=document.getElementById('filterAge');
function render(){
  const q=searchEl.value.toLowerCase(),g=genreEl.value,w=wardEl.value,a=ageEl.value;
  const f=DATA.filter(d=>{
    if(q&&!(d['名称'].toLowerCase().includes(q)||d['住所'].toLowerCase().includes(q)))return false;
    if(g&&d['ジャンル']!==g)return false;
    if(w&&d['区']!==w)return false;
    if(a&&!(d['対象年齢']||'').includes(a))return false;
    return true;
  });
  countEl.textContent=f.length+' 件表示 / 全 '+DATA.length+' 件';
  listEl.innerHTML=f.map(d=>{
    const genre=d['ジャンル'];
    const mapUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(d['住所']);
    let links='<a class="map-link" href="'+mapUrl+'" target="_blank">Google Maps</a>';
    if(d['URL'])links+='<a class="web-link" href="'+d['URL']+'" target="_blank">公式サイト</a>';
    let meta=d['住所'];
    if(d['対象年齢'])meta+='<br>対象: '+d['対象年齢'].replace(/\//g,'・');
    if(d['費用目安'])meta+='<br>費用: '+d['費用目安'];
    if(d['説明'])meta+='<br>'+d['説明'];
    return '<div class="card"><h3>'+d['名称']+'</h3>'+
      '<div class="tags"><span class="tag '+genre+'">'+genre+'</span></div>'+
      '<div class="meta">'+meta+'</div>'+
      '<div class="links">'+links+'</div></div>';
  }).join('');
}
searchEl.addEventListener('input',render);genreEl.addEventListener('change',render);
wardEl.addEventListener('change',render);ageEl.addEventListener('change',render);
render();
